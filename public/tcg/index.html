<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TCG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="lobby">
    <div class="brand">
      <span class="kicker">Team Blue Solo</span>
      <h1>SOLO<span>TCG</span></h1>
      <p class="tagline">La carte-bataille de la team. Feu, ténèbres, fée — et beaucoup de mauvaise foi.</p>
    </div>
    <div class="panel">
      <input id="nameInput" maxlength="20" placeholder="Ton pseudo" />
      <button id="soloBtn" class="btn-primary">Partie test — je joue les 2 côtés</button>
      <button id="joinBtn" class="btn-ghost">Jouer en ligne</button>
      <p id="status"></p>
    </div>
  </div>

  <div id="board" class="hidden">
    <div class="play">
      <div class="hud hud-opp"><span class="who">Adversaire</span><span id="oppInfo"></span></div>
      <section class="zone-wrap">
        <div class="bench" id="oppBench"></div>
        <div class="active-slot" id="oppActive"></div>
      </section>

      <div class="divider"><span>VS</span></div>

      <section class="zone-wrap">
        <div class="active-slot" id="youActive"></div>
        <div class="bench" id="youBench"></div>
      </section>
      <div class="hud hud-you"><span class="who">Toi</span><span id="youInfo"></span></div>
    </div>

    <div id="log"></div>

    <div class="dock">
      <div id="turnHint" class="turn-hint"></div>
      <div id="actions"></div>
      <div class="tray">
        <div class="tray-inner">
          <div class="tray-label">Ta main — clique une carte pour la jouer</div>
          <div id="hand"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="overlay" class="hidden"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="tcg-engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
